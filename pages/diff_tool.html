<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>差分比較</title>
    <!-- テーマ初期化（フラッシュ防止のため defer なし） -->
    <script>
      (function() {
        var t = localStorage.getItem('mytools_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../css/core/tokens.css" />
    <link rel="stylesheet" href="../css/core/ui.css" />
    <link rel="stylesheet" href="../css/components/shortcut_help.css" />
    <link rel="stylesheet" href="../css/diff_tool.css" />
    <script defer src="../js/core/utils.js"></script>
    <script defer src="../js/core/icons.js"></script>
    <script defer src="../js/core/local_storage.js"></script>
    <script defer src="../js/components/toast.js"></script>
    <script defer src="../js/components/shortcut_help.js"></script>
    <script defer src="../js/diff_tool.js"></script>
  </head>
  <body>

    <!-- ページヘッダー -->
    <header class="page-header">
      <div class="page-header__inner">
        <div class="page-header__brand">
          <svg class="page-header__icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M1 7.775V2.75C1 1.784 1.784 1 2.75 1h5.025c.464 0 .91.184 1.238.513l6.25 6.25a1.75 1.75 0 0 1 0 2.474l-5.026 5.026a1.75 1.75 0 0 1-2.474 0l-6.25-6.25A1.752 1.752 0 0 1 1 7.775Zm1.5 0c0 .066.026.13.073.177l6.25 6.25a.25.25 0 0 0 .354 0l5.025-5.025a.25.25 0 0 0 0-.354l-6.25-6.25a.25.25 0 0 0-.177-.073H2.75a.25.25 0 0 0-.25.25ZM6 5a1 1 0 1 1 0 2 1 1 0 0 1 0-2Z"/>
          </svg>
          <h1 class="page-header__title">差分比較</h1>
        </div>
        <div class="page-header__actions">
          <label class="chk-label diff-option">
            <input type="checkbox" id="ignore-whitespace" class="chk-input" />
            <span class="chk-box"></span>
            空白を無視
          </label>
          <div class="diff-mode-toggle" id="mode-toggle">
            <button class="diff-mode-btn diff-mode-btn--active" data-mode="line">行単位</button>
            <button class="diff-mode-btn" data-mode="char">文字単位</button>
          </div>
          <button class="btn btn--ghost btn--sm" id="clear-btn">クリア</button>
        </div>
      </div>
    </header>

    <main class="page-main">

      <!-- 入力エリア -->
      <div class="diff-inputs">
        <div class="diff-input-panel">
          <div class="diff-input-label">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 1A1.75 1.75 0 0 0 1 2.75v10.5C1 14.216 1.784 15 2.75 15h10.5A1.75 1.75 0 0 0 15 13.25V2.75A1.75 1.75 0 0 0 13.25 1ZM2.5 2.75a.25.25 0 0 1 .25-.25h10.5a.25.25 0 0 1 .25.25v10.5a.25.25 0 0 1-.25.25H2.75a.25.25 0 0 1-.25-.25Z"/></svg>
            変更前 / Before
          </div>
          <textarea id="input-left" class="diff-textarea" placeholder="比較元のテキストをここに貼り付けてください..." spellcheck="false"></textarea>
        </div>
        <div class="diff-input-panel">
          <div class="diff-input-label diff-input-label--right">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 1A1.75 1.75 0 0 0 1 2.75v10.5C1 14.216 1.784 15 2.75 15h10.5A1.75 1.75 0 0 0 15 13.25V2.75A1.75 1.75 0 0 0 13.25 1ZM2.5 2.75a.25.25 0 0 1 .25-.25h10.5a.25.25 0 0 1 .25.25v10.5a.25.25 0 0 1-.25.25H2.75a.25.25 0 0 1-.25-.25Z"/><path d="M10.28 8.28a.75.75 0 0 0-1.06-1.06L7.25 9.19l-.72-.72a.75.75 0 0 0-1.06 1.06l1.25 1.25a.75.75 0 0 0 1.06 0l2.5-2.5Z"/></svg>
            変更後 / After
          </div>
          <textarea id="input-right" class="diff-textarea" placeholder="比較先のテキストをここに貼り付けてください..." spellcheck="false"></textarea>
        </div>
      </div>

      <!-- 比較ボタン -->
      <div class="diff-actions">
        <button class="btn btn--primary" id="compare-btn">
          差分を比較
          <span class="diff-shortcut">Ctrl+Enter</span>
        </button>
        <label class="chk-label diff-option">
          <input type="checkbox" id="realtime-compare" class="chk-input" />
          <span class="chk-box"></span>
          リアルタイム比較
        </label>
      </div>

      <!-- 差分結果 -->
      <div class="diff-result" id="diff-result">
        <div class="diff-empty" id="diff-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="48" height="48" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25Z"/></svg>
          <p>左右のテキストを入力して「差分を比較」を押してください</p>
        </div>
        <div id="diff-content" hidden></div>
      </div>

    </main>
  </body>
</html>
