<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>コードスニペット</title>
    <!-- テーマ初期化（フラッシュ防止のため defer なし） -->
    <script>
      (function() {
        var t = localStorage.getItem('mytools_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../css/core/tokens.css" />
    <link rel="stylesheet" href="../css/core/ui.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />
    <link rel="stylesheet" href="../css/components/custom_select.css" />
    <link rel="stylesheet" href="../css/components/shortcut_help.css" />
    <!-- highlight.js テーマ（ライト/ダーク） -->
    <link id="hljs-light" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github.min.css" />
    <link id="hljs-dark"  rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/github-dark.min.css" disabled />
    <link rel="stylesheet" href="../css/snippet.css" />
    <!-- highlight.js 本体 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
    <script defer src="../js/core/utils.js"></script>
    <script defer src="../js/core/icons.js"></script>
    <script defer src="../js/components/shortcut_help.js"></script>
    <script defer src="../js/core/local_storage.js"></script>
    <script defer src="../js/components/toast.js"></script>
    <script defer src="../js/components/custom_select.js"></script>
    <script defer src="../js/db/snippet_db.js"></script>
    <script defer src="../js/snippet.js"></script>
  </head>
  <body>

    <!-- ページヘッダー -->
    <header class="page-header">
      <div class="page-header__inner">
        <div class="page-header__brand">
          <svg class="page-header__icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Zm7.47 3.97a.75.75 0 0 1 1.06 0l2 2a.75.75 0 0 1 0 1.06l-2 2a.749.749 0 0 1-1.275-.326.749.749 0 0 1 .215-.734L10.69 8 9.22 6.53a.75.75 0 0 1 0-1.06ZM6.78 6.53 5.31 8l1.47 1.47a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215l-2-2a.75.75 0 0 1 0-1.06l2-2a.751.751 0 0 1 1.042.018.751.751 0 0 1 .018 1.042Z"/>
          </svg>
          <h1 class="page-header__title">コードスニペット</h1>
        </div>
        <div class="page-header__actions">
          <button class="btn btn--secondary btn--sm" id="export-btn">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>
            エクスポート
          </button>
          <button class="btn btn--secondary btn--sm" id="import-btn">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M11.78 4.22a.749.749 0 1 1-1.06 1.06L8.75 3.311V9a.75.75 0 0 1-1.5 0V3.311L5.28 5.28a.749.749 0 1 1-1.06-1.06l3.25-3.25a.749.749 0 0 1 1.06 0l3.25 3.25Z"/></svg>
            インポート
          </button>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="snippet-layout">

        <!-- 左パネル: 一覧 -->
        <div class="snippet-list-panel">
          <div class="snippet-list-panel__top">
            <div class="snippet-search">
              <svg class="snippet-search__icon" viewBox="0 0 16 16" aria-hidden="true" fill="currentColor">
                <path d="M10.68 11.74a6 6 0 0 1-7.922-8.982 6 6 0 0 1 8.982 7.922l3.04 3.04a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215ZM11.5 7a4.499 4.499 0 1 0-8.997 0A4.499 4.499 0 0 0 11.5 7Z"/>
              </svg>
              <input type="text" id="search-input" class="snippet-search__input" placeholder="検索..." autocomplete="off" />
            </div>
            <select id="lang-filter" class="snippet-lang-select cs-target kn-select--grow">
              <option value="">すべての言語</option>
            </select>
            <div id="tag-filter-bar" class="tag-filter-bar"></div>
          </div>
          <div class="snippet-list-header">
            <span id="snippet-count" class="snippet-count">0 件</span>
            <button class="btn btn--primary btn--sm" id="add-snippet-btn">＋ 追加</button>
          </div>
          <div id="snippet-list" class="snippet-list"></div>
        </div>

        <!-- 右パネル: 詳細 -->
        <div id="snippet-detail" class="snippet-detail-panel"></div>

      </div>
    </main>

    <!-- スニペット追加/編集モーダル -->
    <div id="snippet-modal" class="modal-backdrop" hidden>
      <div class="modal-panel">
        <div class="modal-header">
          <h2 class="modal-title" id="modal-title-text">新しいスニペット</h2>
          <button class="modal-close-btn" id="modal-cancel-btn" aria-label="閉じる">
            <svg viewBox="0 0 16 16" aria-hidden="true" width="16" height="16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          </button>
        </div>
        <form id="snippet-form" class="modal-body" onsubmit="return false;">
          <div class="form-row">
            <label class="form-label" for="modal-title-input">タイトル <span class="required">*</span></label>
            <input type="text" id="modal-title-input" name="modal-title" class="form-input" placeholder="スニペットのタイトル" required />
          </div>
          <div class="form-row form-row--2col">
            <div>
              <label class="form-label" for="modal-language-input">言語</label>
              <select id="modal-language-input" name="modal-language" class="cs-target">
                <option value="">（言語なし）</option>
                <option value="sql">sql</option>
                <option value="javascript">javascript</option>
                <option value="typescript">typescript</option>
                <option value="python">python</option>
                <option value="bash">bash</option>
                <option value="shell">shell</option>
                <option value="java">java</option>
                <option value="go">go</option>
                <option value="rust">rust</option>
                <option value="kotlin">kotlin</option>
                <option value="swift">swift</option>
                <option value="yaml">yaml</option>
                <option value="json">json</option>
                <option value="xml">xml</option>
                <option value="html">html</option>
                <option value="css">css</option>
                <option value="markdown">markdown</option>
                <option value="text">text</option>
              </select>
            </div>
            <div>
              <label class="form-label" for="modal-tags-input">タグ（カンマ区切り）</label>
              <input type="text" id="modal-tags-input" name="modal-tags" class="form-input" placeholder="DB, 便利, ..." />
            </div>
          </div>
          <div class="form-row">
            <label class="form-label" for="modal-description-input">説明</label>
            <input type="text" id="modal-description-input" name="modal-description" class="form-input" placeholder="スニペットの説明（任意）" />
          </div>
          <div class="form-row">
            <label class="form-label" for="modal-code-input">コード <span class="required">*</span></label>
            <textarea id="modal-code-input" name="modal-code" class="form-input form-code-textarea" placeholder="コードをここに入力..." spellcheck="false" required></textarea>
          </div>
        </form>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="modal-cancel-btn-footer">キャンセル</button>
          <button class="btn btn--primary" id="modal-save-btn">保存</button>
        </div>
      </div>
    </div>

    <script>
      // modal-cancel-btn-footer を modal-cancel-btn と同じ動作にバインド
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('modal-cancel-btn-footer')?.addEventListener('click', () => {
          document.getElementById('snippet-modal').hidden = true;
        });
      });
    </script>
  </body>
</html>
