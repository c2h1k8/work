<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>定型作業タイマー</title>
    <!-- テーマ初期化（フラッシュ防止のため defer なし） -->
    <script>
      (function() {
        var t = localStorage.getItem('mytools_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../css/core/tokens.css" />
    <link rel="stylesheet" href="../css/core/ui.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />
    <link rel="stylesheet" href="../css/components/tooltip.css" />
    <link rel="stylesheet" href="../css/components/shortcut_help.css" />
    <link rel="stylesheet" href="../css/timer.css" />
    <script defer src="../js/core/utils.js"></script>
    <script defer src="../js/core/env.js"></script>
    <script defer src="../js/core/file_saver.js"></script>
    <script defer src="../js/core/notify.js"></script>
    <script defer src="../js/core/icons.js"></script>
    <script defer src="../js/core/local_storage.js"></script>
    <script defer src="../js/components/toast.js"></script>
    <script defer src="../js/components/tooltip.js"></script>
    <script defer src="../js/components/shortcut_help.js"></script>
    <script defer src="../js/db/timer_db.js"></script>
    <script defer src="../js/timer/state.js"></script>
    <script defer src="../js/timer/renderer.js"></script>
    <script defer src="../js/timer/events.js"></script>
    <script defer src="../js/timer/app.js"></script>
  </head>
  <body>

    <!-- ページヘッダー -->
    <header class="page-header">
      <div class="page-header__inner">
        <div class="page-header__brand">
          <svg class="page-header__icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0ZM1.5 8a6.5 6.5 0 1 0 13 0 6.5 6.5 0 0 0-13 0Zm7-3.25v2.992l2.028.812a.75.75 0 0 1-.557 1.392l-2.5-1A.751.751 0 0 1 7 8.25v-3.5a.75.75 0 0 1 1.5 0Z"/>
          </svg>
          <h1 class="page-header__title">定型作業タイマー</h1>
        </div>
        <div class="page-header__actions">
          <button id="notif-badge" class="notif-badge" hidden data-tooltip="クリックして通知を許可"></button>
          <button class="btn btn--secondary btn--sm" id="export-btn">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>
            エクスポート
          </button>
          <button class="btn btn--secondary btn--sm" id="import-btn">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M11.78 4.22a.749.749 0 1 1-1.06 1.06L8.75 3.311V9a.75.75 0 0 1-1.5 0V3.311L5.28 5.28a.749.749 0 1 1-1.06-1.06l3.25-3.25a.749.749 0 0 1 1.06 0l3.25 3.25Z"/></svg>
            インポート
          </button>
        </div>
      </div>
    </header>

    <main class="page-main">
      <div class="timer-layout">

        <!-- 左カラム: タイマー + プリセット -->
        <div class="timer-left-col">

          <!-- タイマーセクション -->
          <section class="card timer-section">
            <!-- 円形タイマー -->
            <div class="timer-ring-wrap">
              <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true">
                <!-- 背景リング -->
                <circle class="timer-ring__bg"
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke-width="8"
                />
                <!-- プログレスリング -->
                <circle class="timer-ring__progress" id="timer-ring-progress"
                  cx="100" cy="100" r="90"
                  fill="none"
                  stroke-width="8"
                  stroke-linecap="round"
                  transform="rotate(-90 100 100)"
                />
              </svg>
              <div class="timer-center">
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-mode-badge timer-mode-badge--work" id="timer-mode-badge">作業中</div>
              </div>
            </div>

            <!-- タスク名・タグ入力 -->
            <div class="timer-meta">
              <input type="text" id="timer-task-name" class="timer-meta__input" placeholder="タスク名（任意）" />
              <input type="text" id="timer-tag"       class="timer-meta__input timer-meta__input--tag" placeholder="タグ（任意）" />
            </div>

            <!-- 操作ボタン -->
            <div class="timer-controls">
              <button class="btn btn--primary timer-ctrl-btn" id="start-pause-btn">
                <svg viewBox="0 0 16 16" fill="currentColor" width="18" height="18"><path d="m11.596 8.697-6.363 3.692c-.54.313-1.233-.066-1.233-.697V4.308c0-.63.692-1.01 1.233-.696l6.363 3.692a.802.802 0 0 1 0 1.393z"/></svg>
                開始
              </button>
              <button class="btn btn--secondary timer-ctrl-btn--sm" id="skip-btn" data-tooltip="次のフェーズへスキップ">
                <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15"><path d="M12.5 4a.5.5 0 0 0-1 0v3.248L5.233 3.612C4.713 3.31 4 3.67 4 4.308v7.384c0 .638.713.998 1.233.696L11.5 8.752V12a.5.5 0 0 0 1 0z"/></svg>
                スキップ
              </button>
              <button class="btn btn--ghost timer-ctrl-btn--sm" id="reset-btn" data-tooltip="リセット">
                <svg viewBox="0 0 16 16" fill="currentColor" width="15" height="15"><path d="M11.534 7h3.932a.25.25 0 0 1 .192.41l-1.966 2.36a.25.25 0 0 1-.384 0l-1.966-2.36a.25.25 0 0 1 .192-.41zm-11 2h3.932a.25.25 0 0 0 .192-.41L2.692 6.23a.25.25 0 0 0-.384 0L.342 8.59A.25.25 0 0 0 .534 9z"/><path fill-rule="evenodd" d="M8 3c-1.552 0-2.94.707-3.857 1.818a.5.5 0 1 1-.771-.636A6.002 6.002 0 0 1 13.917 7H12.9A5.002 5.002 0 0 0 8 3zM3.1 9a5.002 5.002 0 0 0 8.757 2.182.5.5 0 1 1 .771.636A6.002 6.002 0 0 1 2.083 9H3.1z"/></svg>
                リセット
              </button>
            </div>
          </section>

          <!-- プリセットセクション -->
          <section class="card preset-section">
            <div class="card__header">
              <h2 class="card__title">プリセット</h2>
              <button class="btn btn--ghost btn--sm" id="add-preset-btn">＋ 追加</button>
            </div>
            <div id="preset-list" class="preset-list"></div>
          </section>

        </div>

        <!-- 右カラム: ログ -->
        <div class="timer-right-col">
          <section class="card log-section">
            <div class="card__header">
              <h2 class="card__title">作業ログ</h2>
              <div class="log-tabs" id="log-tabs">
                <button class="log-tab-btn log-tab-btn--active" data-view="today">今日</button>
                <button class="log-tab-btn" data-view="week">今週</button>
              </div>
              <span class="log-total" id="log-total"></span>
            </div>
            <div id="tag-chart" class="tag-chart" hidden></div>
            <div id="log-list" class="log-list"></div>
          </section>
        </div>

      </div>
    </main>

    <!-- プリセット追加/編集モーダル -->
    <div id="preset-modal" class="modal-backdrop" hidden>
      <div class="modal-panel">
        <div class="modal-header">
          <h2 class="modal-title" id="preset-modal-title">プリセットを追加</h2>
          <button class="modal-close-btn" id="preset-modal-cancel" aria-label="閉じる">
            <svg viewBox="0 0 16 16" aria-hidden="true" width="16" height="16" fill="currentColor"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <label class="form-label" for="preset-name">プリセット名</label>
            <input type="text" id="preset-name" class="form-input" placeholder="例: ポモドーロ" />
          </div>
          <div class="form-row form-row--2col">
            <div>
              <label class="form-label" for="preset-work-min">作業時間（分）</label>
              <input type="number" id="preset-work-min" class="form-input" value="25" min="1" max="120" />
            </div>
            <div>
              <label class="form-label" for="preset-break-min">休憩時間（分）</label>
              <input type="number" id="preset-break-min" class="form-input" value="5" min="1" max="60" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="preset-modal-cancel-footer">キャンセル</button>
          <button class="btn btn--primary"   id="preset-modal-save">保存</button>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('preset-modal-cancel-footer')?.addEventListener('click', () => {
          document.getElementById('preset-modal').hidden = true;
        });
      });
    </script>
  </body>
</html>
