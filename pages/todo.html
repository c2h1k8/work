<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TODO</title>
    <!-- テーマ初期化（フラッシュ防止のため defer なし） -->
    <script>
      (function() {
        var t = localStorage.getItem('mytools_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../css/core/tokens.css" />
    <link rel="stylesheet" href="../css/core/ui.css" />
    <link rel="stylesheet" href="../css/components/custom_select.css" />
    <link rel="stylesheet" href="../css/components/date_picker.css" />
    <link rel="stylesheet" href="../css/components/label_filter.css" />
    <link rel="stylesheet" href="../css/components/label_manager.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />
    <link rel="stylesheet" href="../css/components/shortcut_help.css" />
    <link rel="stylesheet" href="../css/todo.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/marked@4/marked.min.js"></script>
    <script defer src="../js/core/utils.js"></script>
    <script defer src="../js/core/env.js"></script>
    <script defer src="../js/core/opener.js"></script>
    <script defer src="../js/components/custom_select.js"></script>
    <script defer src="../js/components/toast.js"></script>
    <script defer src="../js/components/date_picker.js"></script>
    <script defer src="../js/components/label_filter.js"></script>
    <script defer src="../js/components/label_manager.js"></script>
    <script defer src="../js/core/icons.js"></script>
    <script defer src="../js/components/shortcut_help.js"></script>
    <script defer src="../js/db/kanban_db.js"></script>
    <script defer src="../js/db/activity_db.js"></script>
    <script defer src="../js/core/activity_logger.js"></script>
    <script defer src="../js/todo/state.js"></script>
    <script defer src="../js/todo/backup.js"></script>
    <script defer src="../js/todo/renderer.js"></script>
    <script defer src="../js/todo/dragdrop.js"></script>
    <script defer src="../js/todo/app.js"></script>
  </head>
  <body>

    <!-- ヘッダー -->
    <header class="app-header">
      <div class="app-header__inner">
        <h1 class="app-header__title">
          <svg class="app-header__icon" viewBox="0 0 16 16" aria-hidden="true">
            <path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v12.5A1.75 1.75 0 0 1 14.25 16H1.75A1.75 1.75 0 0 1 0 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Z"/>
            <path d="M7 3.75a.75.75 0 0 1 .75-.75h4a.75.75 0 0 1 0 1.5h-4A.75.75 0 0 1 7 3.75Zm0 4a.75.75 0 0 1 .75-.75h4a.75.75 0 0 1 0 1.5h-4A.75.75 0 0 1 7 7.75Zm0 4a.75.75 0 0 1 .75-.75h4a.75.75 0 0 1 0 1.5h-4a.75.75 0 0 1-.75-.75Zm-4-8a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 3 3.75Zm0 4a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 3 7.75Zm0 4a.75.75 0 0 1 .75-.75h.5a.75.75 0 0 1 0 1.5h-.5A.75.75 0 0 1 3 11.75Z"/>
          </svg>
          Kanban Board
        </h1>
        <div class="app-header__filter">
          <input type="text" id="filter-text" class="filter-text" placeholder="タスクを検索...">
          <select id="filter-due" class="filter-due cs-target kn-select--sm">
            <option value="">期限: すべて</option>
            <option value="has_due">期限あり</option>
            <option value="no_due">期限なし</option>
            <option value="overdue">期限切れ</option>
            <option value="today">今日</option>
            <option value="week">今週</option>
            <option value="month">今月</option>
          </select>
          <!-- ラベルフィルター（LabelFilter コンポーネントが構築） -->
          <div id="filter-label-dropdown"></div>
          <button id="filter-clear" class="btn btn--sm btn--secondary" hidden>クリア</button>
        </div>
        <div class="app-header__sort">
          <select id="sort-select" class="sort-select cs-target kn-select--sm">
            <option value="">並び順: 手動</option>
            <option value="due_date:asc">期限日 ↑</option>
            <option value="due_date:desc">期限日 ↓</option>
            <option value="title:asc">タイトル ↑</option>
            <option value="created_at:asc">作成日 ↑</option>
            <option value="created_at:desc">作成日 ↓</option>
          </select>
        </div>
        <div class="app-header__actions">
          <button class="btn btn--secondary btn--sm" data-action="open-template-modal">
            <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="13" height="13"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            テンプレート
          </button>
          <button class="btn btn--secondary btn--sm" data-action="open-archive-modal">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor" width="13" height="13"><path d="M0 1.75C0 .784.784 0 1.75 0h12.5C15.216 0 16 .784 16 1.75v2.5A1.75 1.75 0 0 1 14.25 6H1.75A1.75 1.75 0 0 1 0 4.25Zm1.75-.25a.25.25 0 0 0-.25.25v2.5c0 .138.112.25.25.25h12.5a.25.25 0 0 0 .25-.25v-2.5a.25.25 0 0 0-.25-.25ZM0 8.75A.75.75 0 0 1 .75 8h14.5a.75.75 0 0 1 0 1.5h-.25v5.75a.75.75 0 0 1-.75.75H1.75a.75.75 0 0 1-.75-.75V9.5H.75A.75.75 0 0 1 0 8.75ZM2.5 9.5v5h11v-5Zm3.25 1.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 0 1.5h-3a.75.75 0 0 1-.75-.75Z"/></svg>
            アーカイブ
          </button>
          <button class="btn btn--secondary btn--sm" data-action="export-backup">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"/></svg>
            エクスポート
          </button>
          <button class="btn btn--secondary btn--sm" data-action="import-backup">
            <svg viewBox="0 0 16 16" aria-hidden="true" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"/><path d="M11.78 4.22a.749.749 0 1 1-1.06 1.06L8.75 3.311V9a.75.75 0 0 1-1.5 0V3.311L5.28 5.28a.749.749 0 1 1-1.06-1.06l3.25-3.25a.749.749 0 0 1 1.06 0l3.25 3.25Z"/></svg>
            インポート
          </button>
        </div>
      </div>
    </header>

    <!-- カンバンボード（カラムは JS で動的生成） -->
    <main id="board" class="board"></main>

    <!-- カードテンプレート（XSS対策：textContentで挿入） -->
    <template id="tpl-card">
      <article class="card" draggable="false">
        <div class="card__labels"></div>
        <p class="card__title"></p>
        <div class="card__footer">
          <span class="card__due"></span>
          <div class="card__actions">
            <button class="card__btn card__btn--archive" data-action="archive-task" aria-label="アーカイブ">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v1.5A1.75 1.75 0 0 1 14.25 6H1.75A1.75 1.75 0 0 1 0 4.25Zm0 4.5v6c0 .966.784 1.75 1.75 1.75h12.5A1.75 1.75 0 0 0 16 13.25v-6H0Zm6.75 1.5h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1 0-1.5Z"/></svg>
            </button>
            <button class="card__btn card__btn--delete" data-action="delete-task" aria-label="削除">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.575l-.66-6.6a.75.75 0 1 1 1.492-.15ZM6.5 1.75V3h3V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Z"/></svg>
            </button>
          </div>
        </div>
      </article>
    </template>

    <!-- タスク詳細モーダル -->
    <div id="task-modal" class="modal" hidden aria-modal="true" role="dialog">
      <div class="modal__backdrop" data-action="close-modal"></div>
      <div class="modal__dialog">
        <div class="modal__header">
          <div class="modal__title-row">
            <span class="modal__title-text" id="modal-title-text"></span>
            <input
              id="modal-title"
              class="modal__title-input"
              type="text"
              placeholder="タスクタイトルを入力..."
              hidden
            />
            <button class="modal__field-edit-btn" data-action="edit-title" aria-label="タイトルを編集">
              <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61Zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354l-1.086-1.086ZM11.189 6.25 9.75 4.81l-6.286 6.287a.25.25 0 0 0-.064.108l-.558 1.953 1.953-.558a.25.25 0 0 0 .108-.064l6.286-6.286Z"/></svg>
            </button>
          </div>
          <button class="modal__close" data-action="close-modal" aria-label="閉じる">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          </button>
        </div>

        <div class="modal__body">
          <!-- 左メインエリア -->
          <div class="modal__main">
            <!-- 説明 -->
            <section class="modal__section">
              <h3 class="modal__section-title">
                <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M0 3.75A.75.75 0 0 1 .75 3h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 3.75Zm0 4A.75.75 0 0 1 .75 7h14.5a.75.75 0 0 1 0 1.5H.75A.75.75 0 0 1 0 7.75Zm0 4a.75.75 0 0 1 .75-.75h7.5a.75.75 0 0 1 0 1.5h-7.5a.75.75 0 0 1-.75-.75Z"/></svg>
                説明
                <button class="modal__field-edit-btn" data-action="edit-description" aria-label="説明を編集">
                  <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M11.013 1.427a1.75 1.75 0 0 1 2.474 0l1.086 1.086a1.75 1.75 0 0 1 0 2.474l-8.61 8.61c-.21.21-.47.364-.756.445l-3.251.93a.75.75 0 0 1-.927-.928l.929-3.25c.081-.286.235-.547.445-.758l8.61-8.61Zm1.414 1.06a.25.25 0 0 0-.354 0L10.811 3.75l1.439 1.44 1.263-1.263a.25.25 0 0 0 0-.354l-1.086-1.086ZM11.189 6.25 9.75 4.81l-6.286 6.287a.25.25 0 0 0-.064.108l-.558 1.953 1.953-.558a.25.25 0 0 0 .108-.064l6.286-6.286Z"/></svg>
                </button>
              </h3>
              <div class="modal__description-view md-body" id="modal-description-view"></div>
              <!-- 説明編集エリア（write/preview タブ付き） -->
              <div class="md-editor" id="desc-editor" hidden>
                <div class="md-editor__tabs">
                  <button type="button" class="md-editor__tab is-active" data-action="md-tab" data-target="desc-editor" data-tab="write">記述</button>
                  <button type="button" class="md-editor__tab" data-action="md-tab" data-target="desc-editor" data-tab="preview">プレビュー</button>
                </div>
                <textarea
                  id="modal-description"
                  class="modal__description"
                  placeholder="タスクの説明を入力... (Ctrl+Enter で保存)"
                  rows="4"
                ></textarea>
                <div class="md-editor__preview md-body" hidden></div>
              </div>
            </section>

            <!-- チェックリスト（サブタスク） -->
            <section class="modal__section" id="modal-checklist-section">
              <h3 class="modal__section-title">
                <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.75 0h10.5C14.216 0 15 .784 15 1.75v12.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V1.75C1 .784 1.784 0 2.75 0Zm0 1.5a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V1.75a.25.25 0 0 0-.25-.25Zm6.28 4.97-3.5 3.5a.749.749 0 0 1-1.06 0l-1.5-1.5a.749.749 0 1 1 1.06-1.06l.97.97 2.97-2.97a.749.749 0 1 1 1.06 1.06Z"/></svg>
                チェックリスト
              </h3>
              <div id="checklist-progress" class="checklist-progress" hidden>
                <div class="checklist-progress__bar"><div class="checklist-progress__fill" id="checklist-progress-fill"></div></div>
                <span class="checklist-progress__text" id="checklist-progress-text"></span>
              </div>
              <div id="modal-checklist-items" class="checklist-items"></div>
              <!-- 新規項目追加フォーム -->
              <div class="checklist-add-row">
                <input type="text" id="checklist-new-input" class="checklist-new-input" placeholder="+ 項目を追加（Enter で確定）" />
              </div>
            </section>

            <!-- コメント / アクティビティ タイムライン -->
            <section class="modal__section">
              <div class="timeline-header">
                <h3 class="modal__section-title">
                  <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M1 2.75C1 1.784 1.784 1 2.75 1h10.5c.966 0 1.75.784 1.75 1.75v7.5A1.75 1.75 0 0 1 13.25 12H9.06l-2.573 2.573A1.458 1.458 0 0 1 4 13.543V12H2.75A1.75 1.75 0 0 1 1 10.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h2a.75.75 0 0 1 .75.75v2.19l2.72-2.72a.749.749 0 0 1 .53-.22h4.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"/></svg>
                  アクティビティ
                </h3>
                <div class="timeline-header__right">
                  <button class="timeline-time-btn" data-action="toggle-time-format" title="絶対時刻で表示" aria-label="時刻形式を切り替え">
                    <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0a8 8 0 1 1 0 16A8 8 0 0 1 8 0Zm-.75 4.5v4.25c0 .414.336.75.75.75h3.25a.75.75 0 0 0 0-1.5H8.75V4.5a.75.75 0 0 0-1.5 0Z"/></svg>
                  </button>
                  <div class="timeline-tabs">
                    <button class="timeline-tab is-active" data-action="timeline-filter" data-filter="comments">コメント</button>
                    <button class="timeline-tab" data-action="timeline-filter" data-filter="all">すべて</button>
                  </div>
                </div>
              </div>
              <div id="modal-comments" class="modal__comments">
                <!-- コメントがここに描画される -->
              </div>
              <div class="modal__comment-form">
                <!-- コメント入力エリア（write/preview タブ付き） -->
                <div class="md-editor" id="comment-editor">
                  <div class="md-editor__tabs">
                    <button class="md-editor__tab is-active" data-action="md-tab" data-target="comment-editor" data-tab="write">記述</button>
                    <button class="md-editor__tab" data-action="md-tab" data-target="comment-editor" data-tab="preview">プレビュー</button>
                  </div>
                  <textarea
                    id="modal-comment-input"
                    class="modal__comment-input"
                    placeholder="コメントを追加... (Ctrl+Enter で投稿)"
                    rows="3"
                  ></textarea>
                  <div class="md-editor__preview md-body" hidden></div>
                </div>
                <div class="modal__comment-actions">
                  <button class="btn btn--primary" data-action="add-comment">コメントを追加</button>
                </div>
              </div>
            </section>
          </div>

          <!-- 右サイドバー -->
          <aside class="modal__sidebar">
            <!-- カラム変更 -->
            <div class="modal__sidebar-item">
              <label class="modal__sidebar-label" for="modal-column">カラム</label>
              <!-- 選択肢は JS で動的生成 -->
              <select id="modal-column" class="modal__select" data-action="save-column"></select>
            </div>

            <!-- 期限（カスタムカレンダー） -->
            <div class="modal__sidebar-item">
              <span class="modal__sidebar-label">期限</span>
              <div class="modal__date-display" id="modal-due-display" data-action="open-datepicker">
                <span id="modal-due-text">日付を選択...</span>
                <svg viewBox="0 0 16 16" aria-hidden="true" width="14" height="14" fill="currentColor">
                  <path d="M4.75 0a.75.75 0 0 1 .75.75V2h5V.75a.75.75 0 0 1 1.5 0V2h1.25c.966 0 1.75.784 1.75 1.75v10.5A1.75 1.75 0 0 1 13.25 16H2.75A1.75 1.75 0 0 1 1 14.25V3.75C1 2.784 1.784 2 2.75 2H4V.75A.75.75 0 0 1 4.75 0Zm0 3.5h6.5V2h-6.5v1.5ZM2.5 5v9.25c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25V5Z"/>
                </svg>
              </div>
              <!-- 実際の値保持用（hidden） -->
              <input type="hidden" id="modal-due" />
            </div>

            <!-- 繰り返し設定 -->
            <div class="modal__sidebar-item" id="modal-recurring-section">
              <span class="modal__sidebar-label">繰り返し</span>
              <div class="recurring-row">
                <label class="toggle-switch">
                  <input type="checkbox" id="modal-recurring-toggle" class="toggle-switch__input" />
                  <span class="toggle-switch__slider"></span>
                </label>
                <span class="recurring-toggle-text">繰り返す</span>
                <div id="modal-recurring-interval-wrap" hidden>
                  <select id="modal-recurring-interval" class="cs-target kn-select--sm recurring-interval">
                    <option value="daily">毎日</option>
                    <option value="weekly">毎週</option>
                    <option value="monthly">毎月</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- ラベル -->
            <div class="modal__sidebar-item">
              <span class="modal__sidebar-label">ラベル</span>
              <div id="modal-labels" class="modal__label-list">
                <!-- 適用済みラベル（× 付き）-->
              </div>
              <div id="modal-existing-labels" class="modal__existing-labels">
                <!-- 未適用の既存ラベル（クリックで追加） -->
              </div>
              <div class="modal__label-manage">
                <button class="btn-manage-labels" data-action="open-label-manager" type="button">
                  <svg viewBox="0 0 16 16" width="12" height="12" fill="currentColor" aria-hidden="true">
                    <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3.879a1.5 1.5 0 0 1 1.06.44l8.5 8.5a1.5 1.5 0 0 1 0 2.12l-3.878 3.879a1.5 1.5 0 0 1-2.122 0l-8.5-8.5A1.5 1.5 0 0 1 1 6.38Zm1.5 0v3.879l8.5 8.5 3.879-3.878-8.5-8.5ZM6 5a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/>
                  </svg>
                  ラベルを管理
                </button>
              </div>
            </div>

            <!-- 依存関係 -->
            <div class="modal__sidebar-item" id="modal-dependencies-section">
              <span class="modal__sidebar-label">依存関係</span>
              <!-- 先行タスク（ブロッカー） -->
              <div class="modal__relation-group" id="modal-dep-blockers-section">
                <span class="modal__sidebar-label" style="font-size:10px;color:var(--color-text-muted)">先行タスク（完了待ち）</span>
                <div id="modal-dep-blockers"></div>
                <button class="modal__relation-add-btn" data-action="pick-dep-blocker">＋ 追加</button>
              </div>
              <!-- 後続タスク（このタスクを待っている） -->
              <div class="modal__relation-group" id="modal-dep-blocked-section">
                <span class="modal__sidebar-label" style="font-size:10px;color:var(--color-text-muted)">後続タスク（このタスクを待っている）</span>
                <div id="modal-dep-blocked"></div>
                <button class="modal__relation-add-btn" data-action="pick-dep-blocked">＋ 追加</button>
              </div>
            </div>

            <!-- ノート紐づけ -->
            <div class="modal__sidebar-item" id="modal-note-section">
              <span class="modal__sidebar-label">ノート</span>
              <div id="modal-note-links"></div>
              <button class="modal__relation-add-btn" data-action="pick-note-task">＋ 追加</button>
            </div>

            <!-- 関係タスク -->
            <div class="modal__sidebar-item" id="modal-relations-section">
              <!-- 親タスク -->
              <div class="modal__relation-group" id="modal-parent-section">
                <span class="modal__sidebar-label">親タスク</span>
                <div id="modal-parent-task"></div>
                <button class="modal__relation-add-btn" data-action="pick-parent">＋ 設定</button>
              </div>
              <!-- 子タスク -->
              <div class="modal__relation-group" id="modal-children-section">
                <span class="modal__sidebar-label">子タスク</span>
                <div id="modal-child-tasks"></div>
                <button class="modal__relation-add-btn" data-action="pick-child">＋ 追加</button>
              </div>
              <!-- 関連タスク -->
              <div class="modal__relation-group" id="modal-related-section">
                <span class="modal__sidebar-label">関連タスク</span>
                <div id="modal-related-tasks"></div>
                <button class="modal__relation-add-btn" data-action="pick-related">＋ 追加</button>
              </div>
            </div>

            <!-- テンプレートとして保存 -->
            <div class="modal__sidebar-item">
              <button class="btn btn--sm btn--secondary" data-action="save-as-template" style="width:100%;justify-content:center;">
                <svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                テンプレートとして保存
              </button>
            </div>

            <!-- タスクアーカイブ・削除 -->
            <div class="modal__sidebar-item modal__sidebar-item--footer">
              <button class="btn btn--sm btn--secondary modal__archive-task-btn" data-action="archive-task">
                <svg viewBox="0 0 16 16" aria-hidden="true" width="12" height="12" fill="currentColor"><path d="M0 2.75C0 1.784.784 1 1.75 1h12.5c.966 0 1.75.784 1.75 1.75v1.5A1.75 1.75 0 0 1 14.25 6H1.75A1.75 1.75 0 0 1 0 4.25Zm0 4.5v6c0 .966.784 1.75 1.75 1.75h12.5A1.75 1.75 0 0 0 16 13.25v-6H0Zm6.75 1.5h2.5a.75.75 0 0 1 0 1.5h-2.5a.75.75 0 0 1 0-1.5Z"/></svg>
                アーカイブ
              </button>
              <button class="btn btn--sm btn--danger modal__delete-task-btn" data-action="delete-task">
                <svg viewBox="0 0 16 16" aria-hidden="true" width="12" height="12" fill="currentColor"><path d="M11 1.75V3h2.25a.75.75 0 0 1 0 1.5H2.75a.75.75 0 0 1 0-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75ZM4.496 6.675l.66 6.6a.25.25 0 0 0 .249.225h5.19a.25.25 0 0 0 .249-.225l.66-6.6a.75.75 0 0 1 1.492.149l-.66 6.6A1.748 1.748 0 0 1 10.595 15h-5.19a1.75 1.75 0 0 1-1.741-1.575l-.66-6.6a.75.75 0 1 1 1.492-.15ZM6.5 1.75V3h3V1.75a.25.25 0 0 0-.25-.25h-2.5a.25.25 0 0 0-.25.25Z"/></svg>
                タスクを削除
              </button>
            </div>
          </aside>
        </div>
      </div>
    </div>


    <!-- タスクピッカー（関係タスク選択用） -->
    <div id="task-picker" class="task-picker" hidden>
      <input id="task-picker-input" type="text" placeholder="タスクを検索..." class="task-picker__input" />
      <ul id="task-picker-list" class="task-picker__list"></ul>
    </div>

    <!-- ノートピッカー（ノート紐づけ選択用） -->
    <div id="note-picker" class="task-picker" hidden>
      <input id="note-picker-input" type="text" placeholder="ノートを検索..." class="task-picker__input" />
      <ul id="note-picker-list" class="task-picker__list"></ul>
    </div>

    <!-- 依存ピッカー（依存関係選択用） -->
    <div id="dep-picker" class="task-picker" hidden>
      <input id="dep-picker-input" type="text" placeholder="タスクを検索..." class="task-picker__input" />
      <ul id="dep-picker-list" class="task-picker__list"></ul>
    </div>

    <!-- テンプレート選択ポップアップ -->
    <div id="template-picker" class="template-picker" hidden>
      <div class="template-picker__header">テンプレートを選択</div>
      <ul id="template-picker-list" class="template-picker__list"></ul>
    </div>

    <!-- テンプレート管理モーダル -->
    <div id="template-modal" class="overlay-modal" hidden>
      <div class="overlay-modal__backdrop" data-action="close-template-modal"></div>
      <div class="overlay-modal__dialog">
        <div class="overlay-modal__header">
          <span class="overlay-modal__title">テンプレート管理</span>
          <button class="overlay-modal__close" data-action="close-template-modal" aria-label="閉じる">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          </button>
        </div>
        <div class="overlay-modal__body template-modal__body">
          <!-- 左カラム: テンプレート一覧 -->
          <div class="template-modal__list-col">
            <button class="btn btn--primary btn--sm" data-action="new-template" style="width:100%;justify-content:center;margin-bottom:8px;">＋ 新規テンプレート</button>
            <ul id="template-list" class="template-list"></ul>
          </div>
          <!-- 右カラム: 編集フォーム -->
          <div class="template-modal__form-col" id="template-form-col">
            <div class="template-form__empty">テンプレートを選択してください</div>
          </div>
        </div>
      </div>
    </div>

    <!-- アーカイブ一覧モーダル -->
    <div id="archive-modal" class="overlay-modal" hidden>
      <div class="overlay-modal__backdrop" data-action="close-archive-modal"></div>
      <div class="overlay-modal__dialog overlay-modal__dialog--full">
        <div class="overlay-modal__header">
          <span class="overlay-modal__title">アーカイブ一覧</span>
          <button class="overlay-modal__close" data-action="close-archive-modal" aria-label="閉じる">
            <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.72 3.72a.75.75 0 0 1 1.06 0L8 6.94l3.22-3.22a.749.749 0 0 1 1.275.326.749.749 0 0 1-.215.734L9.06 8l3.22 3.22a.749.749 0 0 1-.326 1.275.749.749 0 0 1-.734-.215L8 9.06l-3.22 3.22a.751.751 0 0 1-1.042-.018.751.751 0 0 1-.018-1.042L6.94 8 3.72 4.78a.75.75 0 0 1 0-1.06Z"/></svg>
          </button>
        </div>
        <div class="archive-modal__search">
          <input type="text" id="archive-search-input" class="archive-search" placeholder="タイトル・説明で検索..." />
        </div>
        <div class="overlay-modal__body">
          <ul id="archive-list" class="archive-list"></ul>
        </div>
      </div>
    </div>

    <!-- トースト通知 -->
    <!-- トースト: js/components/toast.js が自動生成 -->
  </body>
</html>
