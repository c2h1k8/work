<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ダッシュボード</title>
    <!-- テーマ初期化（フラッシュ防止のため defer なし） -->
    <script>
      (function() {
        var t = localStorage.getItem('mytools_theme') ||
          (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
      })();
    </script>
    <link rel="stylesheet" href="../css/core/tokens.css" />
    <link rel="stylesheet" href="../css/core/ui.css" />
    <link rel="stylesheet" href="../css/components/custom_select.css" />
    <link rel="stylesheet" href="../css/components/toast.css" />
    <link rel="stylesheet" href="../css/components/shortcut_help.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/components/bind_var_modal.css" />
    <link rel="stylesheet" href="../css/components/date_picker.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script defer src="../js/core/utils.js"></script>
    <script defer src="../js/core/env.js"></script>
    <script defer src="../js/core/clipboard.js"></script>
    <script defer src="../js/core/icons.js"></script>
    <script defer src="../js/components/shortcut_help.js"></script>
    <script defer src="../js/components/toast.js"></script>
    <script defer src="../js/components/custom_select.js"></script>
    <script defer src="../js/core/local_storage.js"></script>
    <script defer src="../js/components/bind_var_modal.js"></script>
    <script defer src="../js/components/date_picker.js"></script>
    <script defer src="../js/db/dashboard_db.js"></script>
    <script defer src="../js/dashboard/constants.js"></script>
    <script defer src="../js/dashboard/state.js"></script>
    <script defer src="../js/dashboard/renderer.js"></script>
    <script defer src="../js/dashboard/events.js"></script>
    <script defer src="../js/dashboard/app.js"></script>
  </head>
  <body>
    <!-- 共通バインド変数バー（プリセット選択） -->
    <div id="bind-bar" class="bind-bar" hidden></div>

    <!-- セクションジャンプナビ（3件以上のセクションで表示） -->
    <nav id="section-nav" class="section-nav" hidden></nav>

    <!-- ダッシュボード（JS で動的生成） -->
    <div class="home" id="home-board"></div>

    <!-- 設定ギアボタン -->
    <button class="home-gear-btn" id="home-gear-btn" aria-label="ホーム設定">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>

    <!-- 設定パネル -->
    <aside id="home-settings" class="home-settings" hidden>
      <div class="home-settings__backdrop" data-action="settings-close"></div>
      <div class="home-settings__panel">
        <div class="home-settings__hd">
          <button class="home-settings__back" id="settings-back-btn" data-action="settings-back" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"/>
            </svg>
          </button>
          <h2 class="home-settings__title" id="settings-title">ダッシュボード設定</h2>
          <button class="home-settings__close" data-action="settings-close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <div class="home-settings__body" id="settings-body"></div>
      </div>
    </aside>

    <!-- トースト: js/components/toast.js が自動生成 -->
  </body>
</html>
