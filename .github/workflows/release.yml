name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Web 版 ZIP（既存） ──────────────────────────
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build CSS from LESS
        run: |
          npx lessc css/core/tokens.less          css/core/tokens.css
          npx lessc css/core/ui.less              css/core/ui.css
          npx lessc css/index.less                 css/index.css
          npx lessc css/components/toast.less          css/components/toast.css
          npx lessc css/components/tooltip.less         css/components/tooltip.css
          npx lessc css/components/date_picker.less     css/components/date_picker.css
          npx lessc css/components/label_manager.less   css/components/label_manager.css
          npx lessc css/components/label_filter.less    css/components/label_filter.css
          npx lessc css/components/custom_select.less   css/components/custom_select.css
          npx lessc css/components/bind_var_modal.less  css/components/bind_var_modal.css
          npx lessc css/components/checklist.less       css/components/checklist.css
          npx lessc css/components/shortcut_help.less   css/components/shortcut_help.css
          npx lessc css/components/checkbox.less        css/components/checkbox.css
          npx lessc css/components/radio_pill.less      css/components/radio_pill.css
          npx lessc css/components/activity_log.less    css/components/activity_log.css
          npx lessc css/todo.less      css/todo.css
          npx lessc css/note.less      css/note.css
          npx lessc css/sql.less       css/sql.css
          npx lessc css/dashboard.less css/dashboard.css
          npx lessc css/wbs.less       css/wbs.css
          npx lessc css/timer.less     css/timer.css
          npx lessc css/snippet.less   css/snippet.css
          npx lessc css/diff_tool.less css/diff_tool.css
          npx lessc css/ops.less       css/ops.css
          npx lessc css/text.less      css/text.css

      - name: Cache busting - append version to CSS/JS references
        run: |
          TAG="${GITHUB_REF_NAME}"
          # 全 HTML ファイルの .css" / .js" 参照に ?v=TAG を付与
          for f in index.html pages/*.html; do
            sed -i \
              -e "s/\.css\"/\.css?v=${TAG}\"/g" \
              -e "s/\.css'/\.css?v=${TAG}'/g" \
              -e "s/\.js\"/\.js?v=${TAG}\"/g" \
              -e "s/\.js'/\.js?v=${TAG}'/g" \
              "$f"
            # vendor/ 配下はクエリパラメータ不要（Tauri アセットサーバーがクエリ付きで解決できないため）
            sed -i \
              -e "s|vendor/\([^\"']*\)\.js?v=${TAG}|vendor/\1.js|g" \
              -e "s|vendor/\([^\"']*\)\.css?v=${TAG}|vendor/\1.css|g" \
              "$f"
          done

      - name: Create release ZIPs
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Mac 用: .command ファイルに実行権限を付与
          chmod +x start_server.command stop_server.command

          COMMON_FILES=(
            index.html
            pages/
            favicon.svg
            js/
            css/
            vendor/
          )
          COMMON_EXCLUDE=(
            -x "css/**/*.less"
            -x "js/core/.gitkeep"
          )

          # Windows ZIP
          ZIP_WIN="mytools-${TAG}-windows.zip"
          zip -r "${ZIP_WIN}" \
            "${COMMON_FILES[@]}" \
            start_server.bat \
            stop_server.bat \
            "${COMMON_EXCLUDE[@]}"

          # Mac ZIP
          ZIP_MAC="mytools-${TAG}-mac.zip"
          zip -r "${ZIP_MAC}" \
            "${COMMON_FILES[@]}" \
            start_server.command \
            stop_server.command \
            "${COMMON_EXCLUDE[@]}"

          echo "ZIP_WIN=${ZIP_WIN}" >> "$GITHUB_ENV"
          echo "ZIP_MAC=${ZIP_MAC}" >> "$GITHUB_ENV"

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-zips
          path: |
            ${{ env.ZIP_WIN }}
            ${{ env.ZIP_MAC }}

  # ── Tauri デスクトップアプリ ────────────────────
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: mac-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build CSS from LESS
        run: |
          npx lessc css/core/tokens.less          css/core/tokens.css
          npx lessc css/core/ui.less              css/core/ui.css
          npx lessc css/index.less                 css/index.css
          npx lessc css/components/toast.less          css/components/toast.css
          npx lessc css/components/tooltip.less         css/components/tooltip.css
          npx lessc css/components/date_picker.less     css/components/date_picker.css
          npx lessc css/components/label_manager.less   css/components/label_manager.css
          npx lessc css/components/label_filter.less    css/components/label_filter.css
          npx lessc css/components/custom_select.less   css/components/custom_select.css
          npx lessc css/components/bind_var_modal.less  css/components/bind_var_modal.css
          npx lessc css/components/checklist.less       css/components/checklist.css
          npx lessc css/components/shortcut_help.less   css/components/shortcut_help.css
          npx lessc css/components/checkbox.less        css/components/checkbox.css
          npx lessc css/components/radio_pill.less      css/components/radio_pill.css
          npx lessc css/components/activity_log.less    css/components/activity_log.css
          npx lessc css/todo.less      css/todo.css
          npx lessc css/note.less      css/note.css
          npx lessc css/sql.less       css/sql.css
          npx lessc css/dashboard.less css/dashboard.css
          npx lessc css/wbs.less       css/wbs.css
          npx lessc css/timer.less     css/timer.css
          npx lessc css/snippet.less   css/snippet.css
          npx lessc css/diff_tool.less css/diff_tool.css
          npx lessc css/ops.less       css/ops.css
          npx lessc css/text.less      css/text.css

      - name: Cache busting
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          for f in index.html pages/*.html; do
            sed -i.bak \
              -e "s/\.css\"/\.css?v=${TAG}\"/g" \
              -e "s/\.css'/\.css?v=${TAG}'/g" \
              -e "s/\.js\"/\.js?v=${TAG}\"/g" \
              -e "s/\.js'/\.js?v=${TAG}'/g" \
              "$f"
            rm -f "$f.bak"
            # vendor/ 配下はクエリパラメータ不要（Tauri アセットサーバーがクエリ付きで解決できないため）
            sed -i.bak \
              -e "s|vendor/\([^\"']*\)\.js?v=${TAG}|vendor/\1.js|g" \
              -e "s|vendor/\([^\"']*\)\.css?v=${TAG}|vendor/\1.css|g" \
              "$f"
            rm -f "$f.bak"
          done

      - name: Sync app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # tauri.conf.json のバージョンを更新
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          # Cargo.toml のバージョンを更新
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Prepare frontend dist
        shell: bash
        run: |
          mkdir -p dist/pages dist/js dist/css
          cp index.html favicon.svg dist/
          cp -r pages/* dist/pages/
          cp -r js/* dist/js/
          # CSS: .css のみコピー（.less は除外）
          find css -name '*.css' | while read f; do
            mkdir -p "dist/$(dirname "$f")"
            cp "$f" "dist/$f"
          done

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  # ── GitHub Release 作成 ─────────────────────────
  publish:
    needs: [web, tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          # Web ZIPs
          cp artifacts/web-zips/*.zip release/
          # Tauri Mac ARM64
          cp artifacts/tauri-mac-arm64/dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-mac-arm64/macos/*.app.tar.gz release/ 2>/dev/null || true
          # Tauri Mac x64
          cp artifacts/tauri-mac-x64/dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-mac-x64/macos/*.app.tar.gz release/ 2>/dev/null || true
          # Tauri Windows
          cp artifacts/tauri-windows-x64/nsis/*.exe release/ 2>/dev/null || true
          cp artifacts/tauri-windows-x64/msi/*.msi release/ 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
