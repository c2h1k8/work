name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  # ── Web 版 ZIP（既存） ──────────────────────────
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Create release ZIPs
        run: |
          TAG="${GITHUB_REF_NAME}"

          # Mac 用: .command ファイルに実行権限を付与
          chmod +x start_server.command stop_server.command

          # Windows ZIP
          ZIP_WIN="mytools-${TAG}-windows.zip"
          zip -r "${ZIP_WIN}" \
            dist/ \
            start_server.bat \
            stop_server.bat

          # Mac ZIP
          ZIP_MAC="mytools-${TAG}-mac.zip"
          zip -r "${ZIP_MAC}" \
            dist/ \
            start_server.command \
            stop_server.command

          echo "ZIP_WIN=${ZIP_WIN}" >> "$GITHUB_ENV"
          echo "ZIP_MAC=${ZIP_MAC}" >> "$GITHUB_ENV"

      - name: Upload Web artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-zips
          path: |
            ${{ env.ZIP_WIN }}
            ${{ env.ZIP_MAC }}

  # ── Tauri デスクトップアプリ ────────────────────
  tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: mac-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: mac-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows-x64

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Sync app version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # tauri.conf.json のバージョンを更新
          sed -i.bak "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          rm -f src-tauri/tauri.conf.json.bak
          # Cargo.toml のバージョンを更新
          sed -i.bak "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml
          rm -f src-tauri/Cargo.toml.bak

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build Tauri app
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload Tauri artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.label }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

  # ── GitHub Release 作成 ─────────────────────────
  publish:
    needs: [web, tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release
          # Web ZIPs
          cp artifacts/web-zips/*.zip release/
          # Tauri Mac ARM64
          cp artifacts/tauri-mac-arm64/dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-mac-arm64/macos/*.app.tar.gz release/ 2>/dev/null || true
          # Tauri Mac x64
          cp artifacts/tauri-mac-x64/dmg/*.dmg release/ 2>/dev/null || true
          cp artifacts/tauri-mac-x64/macos/*.app.tar.gz release/ 2>/dev/null || true
          # Tauri Windows
          cp artifacts/tauri-windows-x64/nsis/*.exe release/ 2>/dev/null || true
          cp artifacts/tauri-windows-x64/msi/*.msi release/ 2>/dev/null || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release/*
